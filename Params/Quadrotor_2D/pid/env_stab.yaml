# PID + quadratic cost, for EDMD data collection for stabilization task.
# Pair with: Params/algorithms/pid_drone_gains.yaml
# Aligned with Params/Quadrotor_2D/env_stab.yaml for mass/inertia.
# Wide randomization to get diverse stabilization error coverage.
task_config:
  seed: 1337
  ctrl_freq: 50
  pyb_freq: 1000
  gui: False
  physics: pyb
  quad_type: 2
  normalized_rl_action_space: False

  init_state:
    init_x: 0.0
    init_x_dot: 0
    init_z: 1.0
    init_z_dot: 0
    init_theta: 0
    init_theta_dot: 0
  init_state_randomization_info:
    init_x:
      distrib: 'uniform'
      low: -1.5
      high: 1.5
    init_x_dot:
      distrib: 'uniform'
      low: -0.5
      high: 0.5
    init_z:
      distrib: 'uniform'
      low: 0.4
      high: 1.8
    init_z_dot:
      distrib: 'uniform'
      low: -0.5
      high: 0.5
    init_theta:
      distrib: 'uniform'
      low: -0.15
      high: 0.15
    init_theta_dot:
      distrib: 'uniform'
      low: -0.5
      high: 0.5
  randomized_init: True
  randomized_inertial_prop: False

  task: stabilization
  task_info:
    stabilization_goal: [0, 1]
    stabilization_goal_tolerance: 0.0

  inertial_prop:
    M: 0.027
    Iyy: 1.4e-05

  episode_len_sec: 5
  cost: quadratic
  done_on_out_of_bound: True
