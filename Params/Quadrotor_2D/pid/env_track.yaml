# PID + quadratic cost, for EDMD data collection (edmd/collect_quad_2d.py, PID_controller_quadrotor.py).
# Pair with: Params/algorithms/pid_drone_gains.yaml
# Aligned with Params/Quadrotor_2D/env_track.yaml for mass/inertia, trajectory_scale, and episode length
# so EDMD/LC-SAC see the same plant and path scale as RL training.
task_config:
  seed: 1337
  ctrl_freq: 50
  pyb_freq: 1000
  gui: False
  physics: pyb
  quad_type: 2
  normalized_rl_action_space: False

  init_state:
    init_x: 1
    init_x_dot: 0
    init_z: 1
    init_z_dot: 0
    init_theta: 0
    init_theta_dot: 0
  init_state_randomization_info:
    init_x:
      distrib: 'uniform'
      low: 0.5
      high: 1.05
    init_x_dot:
      distrib: 'uniform'
      low: -0.05
      high: 0.05
    init_z:
      distrib: 'uniform'
      low: 0.8
      high: 1.2
    init_z_dot:
      distrib: 'uniform'
      low: -0.05
      high: 0.05
    init_theta:
      distrib: 'uniform'
      low: -0.5
      high: 0.5
    init_theta_dot:
      distrib: 'uniform'
      low: -0.05
      high: 0.05
  randomized_init: True
  randomized_inertial_prop: False

  task: traj_tracking
  task_info:
    trajectory_type: circle
    num_cycles: 1
    trajectory_plane: 'xz'
    trajectory_position_offset: [0, 1]
    trajectory_scale: 1

  inertial_prop:
    M: 0.027
    Iyy: 1.4e-05

  episode_len_sec: 5
  cost: quadratic
  done_on_out_of_bound: False   # disabled for EDMD data collection so episodes run to full length
