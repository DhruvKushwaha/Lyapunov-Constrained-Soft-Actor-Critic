# PID + quadratic cost for 3D trajectory tracking experiments.
# Pair with: Params/algorithms/pid_drone_gains.yaml (same gains as 2D; controller handles QUAD_TYPE).
# Inertial props match Params/Quadrotor_3D/env_track_gym.yaml benchmark.
task_config:
  seed: 42
  ctrl_freq: 50
  pyb_freq: 1000
  gui: False
  physics: pyb
  quad_type: 3

  init_state_randomization_info:
    init_x:
      distrib: 'uniform'
      low: -0.5
      high: 0.5
    init_x_dot:
      distrib: 'uniform'
      low: -0.1
      high: 0.1
    init_y:
      distrib: 'uniform'
      low: -0.5
      high: 0.5
    init_y_dot:
      distrib: 'uniform'
      low: -0.1
      high: 0.1
    init_z:
      distrib: 'uniform'
      low: 0.75
      high: 1.25
    init_z_dot:
      distrib: 'uniform'
      low: -0.1
      high: 0.1
    init_phi:
      distrib: 'uniform'
      low: -0.2
      high: 0.2
    init_theta:
      distrib: 'uniform'
      low: -0.2
      high: 0.2
    init_psi:
      distrib: 'uniform'
      low: -0.2
      high: 0.2
    init_p:
      distrib: 'uniform'
      low: -0.1
      high: 0.1
    init_q:
      distrib: 'uniform'
      low: -0.1
      high: 0.1
    init_r:
      distrib: 'uniform'
      low: -0.1
      high: 0.1
  randomized_init: True
  randomized_inertial_prop: False

  task: traj_tracking
  task_info:
    trajectory_type: figure8
    num_cycles: 1
    trajectory_plane: 'xz'
    trajectory_position_offset: [0, 1]
    trajectory_scale: 0.75
    proj_point: [0, 0, 0.5]
    proj_normal: [0, 1, 1]

  inertial_prop:
    M: 0.027
    Ixx: 1.4e-5
    Iyy: 1.4e-5
    Izz: 2.17e-5

  episode_len_sec: 6
  cost: quadratic
  done_on_out_of_bound: True
