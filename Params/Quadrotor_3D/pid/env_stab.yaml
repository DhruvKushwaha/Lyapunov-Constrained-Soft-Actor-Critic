# PID env config for 3D quadrotor stabilisation EDMD data collection.
# Wider init randomisation than env_track.yaml to cover the stabilisation basin.
task_config:
  seed: 42
  ctrl_freq: 50
  pyb_freq: 1000
  gui: False
  physics: pyb
  quad_type: 3

  randomized_init: True
  randomized_inertial_prop: False
  init_state_randomization_info:
    init_x:
      distrib: 'uniform'
      low: -1.0
      high: 1.0
    init_x_dot:
      distrib: 'uniform'
      low: -0.5
      high: 0.5
    init_y:
      distrib: 'uniform'
      low: -1.0
      high: 1.0
    init_y_dot:
      distrib: 'uniform'
      low: -0.5
      high: 0.5
    init_z:
      distrib: 'uniform'
      low: 0.5
      high: 1.5
    init_z_dot:
      distrib: 'uniform'
      low: -0.5
      high: 0.5
    init_phi:
      distrib: 'uniform'
      low: -0.15
      high: 0.15
    init_theta:
      distrib: 'uniform'
      low: -0.15
      high: 0.15
    init_psi:
      distrib: 'uniform'
      low: -0.15
      high: 0.15
    init_p:
      distrib: 'uniform'
      low: -0.2
      high: 0.2
    init_q:
      distrib: 'uniform'
      low: -0.2
      high: 0.2
    init_r:
      distrib: 'uniform'
      low: -0.2
      high: 0.2

  task: stabilization
  task_info:
    stabilization_goal: [0, 0, 1]
    stabilization_goal_tolerance: 0.0

  inertial_prop:
    M: 0.027
    Ixx: 1.4e-5
    Iyy: 1.4e-5
    Izz: 2.17e-5

  episode_len_sec: 5
  cost: quadratic
  done_on_out_of_bound: True
