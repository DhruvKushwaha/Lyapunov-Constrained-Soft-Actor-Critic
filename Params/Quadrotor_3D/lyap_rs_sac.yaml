# Lyapunov Reward-Shaping SAC hyperparameters for quadrotor_3D.
#
# Base SAC params are identical to sac.yaml / SCG reference for fair comparison.
# Lyap-RS-SAC-specific parameters:
#   lyap_rs_weight : w in r_shaped = r + w*(V(z_t) - gamma*V(z_{t+1})).
#                    Set to 0.0 for auto-calibration from E[|r|]/E[|ΔV|] over random rollouts.
algo: lyap_rs_sac
algo_config:
  # model args — identical to sac.yaml / SCG reference
  hidden_dim: 128
  activation: relu
  use_entropy_tuning: False

  # optim args — identical to sac.yaml / SCG reference
  train_interval: 1
  train_batch_size: 256
  actor_lr: 0.001
  critic_lr: 0.001
  entropy_lr: 0.001

  # runner args
  max_env_steps: 400000
  warm_up_steps: 1000
  max_buffer_size: 1000000
  eval_batch_size: 10

  # misc
  log_interval: 4000
  eval_interval: 4000
  eval_save_best: True

  # Lyap-RS-SAC specific — not present in sac.yaml / lcsac.yaml
  lyap_rs_weight: 0.0
  calibrate_steps: 500
