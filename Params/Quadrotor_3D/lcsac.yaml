# LC-SAC hyperparameters for quadrotor_3D.
#
# Base SAC params identical to sac.yaml / SCG sac_quadrotor_3D.yaml for fair comparison.
# LC-SAC-specific differences from SAC:
#   lyap_ramp_steps : 100000 — steps over which the Lyapunov weight rises 0 → 1 (25% of total)
algo: lcsac
algo_config:
  # model args — identical to sac.yaml / SCG reference
  hidden_dim: 128
  activation: relu
  use_entropy_tuning: False

  # optim args — identical to sac.yaml / SCG reference
  train_interval: 1
  train_batch_size: 256
  actor_lr: 0.001
  critic_lr: 0.001
  entropy_lr: 0.001

  # runner args
  max_env_steps: 400000
  warm_up_steps: 1000
  rollout_batch_size: 4
  num_workers: 1
  max_buffer_size: 1000000
  deque_size: 10
  eval_batch_size: 10

  # misc
  log_interval: 4000
  save_interval: 0
  num_checkpoints: 0
  eval_interval: 4000
  eval_save_best: True
  tensorboard: False

  # LC-SAC specific — not present in sac.yaml
  lyap_ramp_steps: 100000
  lam_max: 50.0
  lam_lr: 1.0e-3
  decay_rate: 0.0
  cvar_q: 0.75
